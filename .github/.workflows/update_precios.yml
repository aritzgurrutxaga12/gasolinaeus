name: Actualizar precios gasolineras

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: update-precios
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Sincronizar rama
        run: |
          git pull --rebase origin main

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests urllib3

      - name: Actualizar precios
        run: python update_precios.py

      - name: Verificar fichero generado
        run: |
          ls -la
          python - <<'PY'
          import json
          with open("precios_gasolineras.json", "r", encoding="utf-8") as f:
              payload = json.load(f)
          print("fecha_descarga:", payload.get("fecha_descarga"))
          print("registros:", len(payload.get("datos", [])))
          PY

      - name: Guardar cambios
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git status
          git add precios_gasolineras.json
          if git diff --cached --quiet; then
            echo "Sin cambios para commitear"
            exit 0
          fi
          git commit -m "Actualizar precios gasolineras"
          git pull --rebase origin main
          git push origin HEAD:main
